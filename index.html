<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>macOS Web</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍎</text></svg>">
</head>
<body>
  <!-- Boot Screen -->
  <div id="boot-screen">
    <div class="boot-logo">
      <svg viewBox="0 0 170 170" width="120" height="120" fill="white">
        <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.2-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.74 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.93 0.21-9.84-1.96-14.74-6.52-3.13-2.73-7.05-7.41-11.77-14.02-5.05-7.08-9.2-15.29-12.45-24.65-3.47-10.11-5.21-19.9-5.21-29.38 0-10.86 2.35-20.22 7.04-28.06 3.69-6.31 8.6-11.3 14.75-14.98 6.15-3.69 12.8-5.56 19.97-5.7 3.91 0 9.02 1.21 15.34 3.59 6.31 2.39 10.45 3.6 12.41 3.6 1.47 0 6.11-1.42 13.91-4.24 7.34-2.62 13.59-3.72 18.75-3.3 13.91 1.12 24.5 6.48 31.78 16.09-12.46 7.55-18.63 18.19-18.52 31.95 0.11 10.64 3.96 19.53 11.56 26.63 3.47 3.29 7.35 5.85 11.65 7.65-0.9 2.61-1.85 5.11-2.86 7.51zM119.11 7.26c0 8.08-2.96 15.62-8.86 22.59-7.09 8.29-15.63 13.05-24.99 12.31a20 20 0 0 1-.19-2.58c0-7.75 3.45-16.04 9.59-22.8 3.09-3.46 7.05-6.35 11.89-8.67 4.83-2.31 9.36-3.56 13.57-3.76 0.12 1.29.17 2.56.17 3.81-.01.12-.01.24-.01.35-.01.26-.01.52-.01.78.01-.1.01-.2.01-.3z"/>
      </svg>
    </div>
    <div class="boot-progress">
      <div class="boot-progress-bar" id="boot-progress-bar"></div>
    </div>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" class="hidden">
    <div class="login-blur"></div>
    <div class="login-content">
      <div class="login-avatar">
        <svg viewBox="0 0 100 100" width="80" height="80">
          <circle cx="50" cy="50" r="48" fill="#4a90d9"/>
          <circle cx="50" cy="38" r="16" fill="white"/>
          <ellipse cx="50" cy="72" rx="28" ry="22" fill="white"/>
        </svg>
      </div>
      <h2 class="login-username">User</h2>
      <div class="login-password-wrapper">
        <svg class="login-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="login-password" placeholder="Password" autofocus>
      </div>
      <p class="login-hint">Press Enter to sign in</p>
    </div>
    <div class="login-datetime">
      <div id="login-time"></div>
      <div id="login-date"></div>
    </div>
  </div>

  <!-- Desktop -->
  <div id="desktop" class="hidden">
    <!-- Menu Bar -->
    <div id="menu-bar">
      <div class="menu-left">
        <div class="menu-apple" id="menu-apple-btn">
          <svg viewBox="0 0 170 170" width="16" height="16">
            <path fill="white" d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.2-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.74 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.93 0.21-9.84-1.96-14.74-6.52-3.13-2.73-7.05-7.41-11.77-14.02-5.05-7.08-9.2-15.29-12.45-24.65-3.47-10.11-5.21-19.9-5.21-29.38 0-10.86 2.35-20.22 7.04-28.06 3.69-6.31 8.6-11.3 14.75-14.98 6.15-3.69 12.8-5.56 19.97-5.7 3.91 0 9.02 1.21 15.34 3.59 6.31 2.39 10.45 3.6 12.41 3.6 1.47 0 6.11-1.42 13.91-4.24 7.34-2.62 13.59-3.72 18.75-3.3 13.91 1.12 24.5 6.48 31.78 16.09-12.46 7.55-18.63 18.19-18.52 31.95 0.11 10.64 3.96 19.53 11.56 26.63 3.47 3.29 7.35 5.85 11.65 7.65-0.9 2.61-1.85 5.11-2.86 7.51zM119.11 7.26c0 8.08-2.96 15.62-8.86 22.59-7.09 8.29-15.63 13.05-24.99 12.31a20 20 0 0 1-.19-2.58c0-7.75 3.45-16.04 9.59-22.8 3.09-3.46 7.05-6.35 11.89-8.67 4.83-2.31 9.36-3.56 13.57-3.76 0.12 1.29.17 2.56.17 3.81-.01.12-.01.24-.01.35-.01.26-.01.52-.01.78.01-.1.01-.2.01-.3z"/>
          </svg>
        </div>
        <span class="menu-app-name" id="menu-app-name">Finder</span>
        <div class="menu-items" id="menu-items">
          <div class="menu-item" data-menu="file">File</div>
          <div class="menu-item" data-menu="edit">Edit</div>
          <div class="menu-item" data-menu="view">View</div>
          <div class="menu-item" data-menu="go">Go</div>
          <div class="menu-item" data-menu="window">Window</div>
          <div class="menu-item" data-menu="help">Help</div>
        </div>
      </div>
      <div class="menu-right">
        <div class="menu-icon" id="menu-bluetooth" title="Bluetooth">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/></svg>
        </div>
        <div class="menu-icon" id="menu-wifi" title="Wi-Fi">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        </div>
        <div class="menu-icon" id="menu-battery" title="Battery">
          <svg viewBox="0 0 24 24" width="18" height="16" fill="none" stroke="white" stroke-width="1.5">
            <rect x="1" y="4" width="18" height="12" rx="2" ry="2"/>
            <rect x="21" y="8" width="2" height="4" rx="0.5" fill="white"/>
            <rect x="3" y="6" width="14" height="8" rx="1" fill="white"/>
          </svg>
        </div>
        <div class="menu-icon" id="menu-spotlight" title="Spotlight">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
        <div class="menu-icon" id="menu-control-center" title="Control Center">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="1.8">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </div>
        <div class="menu-clock" id="menu-clock">
          <div id="menu-clock-time"></div>
          <div id="menu-clock-date"></div>
        </div>
      </div>
    </div>

    <!-- Desktop Icons -->
    <div id="desktop-icons"></div>

    <!-- Windows Container -->
    <div id="windows-container"></div>

    <!-- Dock -->
    <div id="dock-container">
      <div class="dock-separator"></div>
      <div id="dock"></div>
    </div>

    <!-- Spotlight Overlay -->
    <div id="spotlight-overlay" class="hidden">
      <div id="spotlight">
        <div class="spotlight-header">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="#999"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="spotlight-input" placeholder="Spotlight Search" autocomplete="off">
        </div>
        <div id="spotlight-results"></div>
      </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="hidden"></div>

    <!-- Notification Center -->
    <div id="notification-center" class="hidden">
      <div class="nc-header">
        <h3>Notification Center</h3>
        <button id="nc-clear" class="nc-clear-btn">Clear All</button>
      </div>
      <div id="nc-notifications"></div>
    </div>

    <!-- Control Center -->
    <div id="control-center" class="hidden">
      <div class="cc-grid">
        <div class="cc-tile cc-connectivity">
          <div class="cc-tile-group">
            <div class="cc-tile-item active" data-toggle="wifi">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
              <span>Wi-Fi</span>
              <span class="cc-status">Home Network</span>
            </div>
            <div class="cc-tile-item active" data-toggle="bluetooth">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/></svg>
              <span>Bluetooth</span>
              <span class="cc-status">On</span>
            </div>
          </div>
          <div class="cc-tile-item" data-toggle="airdrop">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
            <span>AirDrop</span>
            <span class="cc-status">Contacts Only</span>
          </div>
        </div>
        <div class="cc-tile cc-media">
          <div class="cc-tile-item cc-music">
            <div class="cc-music-art">🎵</div>
            <div class="cc-music-info">
              <span class="cc-music-title">Not Playing</span>
              <span class="cc-music-artist">Music</span>
            </div>
          </div>
        </div>
        <div class="cc-tile cc-sounds">
          <div class="cc-tile-label">Sound</div>
          <div class="cc-slider-row">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <input type="range" min="0" max="100" value="70" class="cc-slider" id="cc-sound-slider">
          </div>
          <div class="cc-tile-label">Display</div>
          <div class="cc-slider-row">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/></svg>
            <input type="range" min="0" max="100" value="80" class="cc-slider" id="cc-display-slider">
          </div>
        </div>
        <div class="cc-tile cc-focus">
          <div class="cc-tile-label">Focus</div>
          <div class="cc-focus-modes">
            <div class="cc-focus-item" data-mode="off">
              <span>🔔</span>
              <span>Off</span>
            </div>
            <div class="cc-focus-item" data-mode="do-not-disturb">
              <span>🌙</span>
              <span>Do Not<br>Disturb</span>
            </div>
            <div class="cc-focus-item" data-mode="sleep">
              <span>😴</span>
              <span>Sleep</span>
            </div>
          </div>
        </div>
        <div class="cc-tile cc-bottom">
          <div class="cc-tile-item" id="cc-lock-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <span>Lock Screen</span>
          </div>
          <div class="cc-tile-item" id="cc-screenshot-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
            <span>Screenshot</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Dock Magnification -->
    <div id="dock-magnify" class="hidden"></div>
  </div>

  <script src="js/window-manager.js"></script>
  <script src="js/apps/finder.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/calculator.js"></script>
  <script src="js/apps/notes.js"></script>
  <script src="js/apps/textedit.js"></script>
  <script src="js/apps/safari.js"></script>
  <script src="js/apps/calendar.js"></script>
  <script src="js/apps/system-prefs.js"></script>
  <script src="js/apps/photos.js"></script>
  <script src="js/apps/music.js"></script>
  <script src="js/apps/reminders.js"></script>
  <script src="js/apps/weather.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
